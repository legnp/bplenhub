<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Análise Comportamental | LENS by Lis.</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/logo_lensbylis_dho_original_icon.svg?v=1.2">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;700;900&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../sobre.css">

    <style>
        .product-hero {
            padding-top: 5px;
            padding-bottom: 60px;
            position: relative;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 80px;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-image-container {
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            height: 380px;
            margin-bottom: 24px;
        }

        .product-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-main-content {
            color: var(--fg-muted);
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .product-main-content p {
            margin-bottom: 1.6rem;
            text-align: justify;
            hyphens: none;
        }

        .product-subtitle {
            color: var(--pitaya);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 2.5rem 0 1rem;
            display: block;
        }

        .product-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 2rem;
        }

        .product-list li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 12px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .product-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--pitaya);
            font-weight: bold;
        }

        .product-main-content h1 {
            font-size: 35px;
            margin-bottom: 30px;
            color: white;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .kicker {
            margin-bottom: 8px;
        }

        .product-sidebar {
            position: sticky;
            top: 100px;
        }

        .specs-card {
            padding: 32px;
            background: rgba(20, 10, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-tag {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--pitaya);
            display: block;
            margin-bottom: 4px;
        }

        .pay-details {
            display: block;
            margin-bottom: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .seo-body-section {
            margin-top: 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 40px;
        }

        .seo-body-section h2 {
            color: white;
            margin: 40px 0 20px;
            font-size: 1.6rem;
            font-family: 'Outfit', sans-serif;
        }

        /* FAQ Styling Refinement */
        .faq-container {
            margin-top: 40px;
            padding: 36px 60px;
            max-width: 900px;
            margin-inline: auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .faq-item {
            margin-bottom: 0;
            padding: 24px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .faq-item:last-child {
            border-bottom: none;
        }

        .faq-question {
            font-size: 1.15rem;
            color: white !important;
            margin-bottom: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        .faq-answer {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.6;
            text-align: justify;
            hyphens: none;
        }

        /* Pulsing Animation for Purchase Button */
        @keyframes gentlePulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(191, 48, 124, 0.4);
            }

            50% {
                transform: scale(1.02);
                box-shadow: 0 0 20px 5px rgba(191, 48, 124, 0.2);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(191, 48, 124, 0);
            }
        }

        .btn-pulse {
            animation: gentlePulse 2s infinite ease-in-out;
        }

        /* Doubts Button Specifics */
        .btn-outline-glow {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .btn-outline-glow:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--pitaya);
            color: white;
            box-shadow: 0 0 15px rgba(191, 48, 124, 0.2);
        }

        /* Doubts Modal Selection Styles */
        .doubts-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .opt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .opt-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--pitaya);
            transform: translateY(-5px);
        }

        .opt-card h4 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            color: white;
            margin: 0;
        }

        .opt-card p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
        }

        .opt-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .doubts-options {
                grid-template-columns: 1fr;
            }

            .product-main-content h1 {
                font-size: 20.8px !important;
            }

            #productIntro {
                font-size: 0.9rem !important;
            }

            .faq-container {
                padding: 30px 20px !important;
            }

            .product-list li {
                font-size: 14.4px !important;
            }
        }

        @media (max-width: 1000px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .product-image-container {
                height: 320px;
            }

            .product-sidebar {
                position: static;
            }
        }
    </style>
</head>

<body>
    <!-- Global Header Placeholder -->
    <header id="global-header"></header>

    <!-- Global Social Sidebar Placeholder -->
    <div id="global-social"></div>

    <main class="page-wrap">
        <div class="bg-visuals">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
        </div>

        <section class="product-hero">
            <div class="container">
                <div class="product-grid">

                    <div class="product-info-col">
                        <div class="product-main-content" id="productMain">
                            <span class="kicker" id="kickerTag">Para Pessoas</span>
                            <h1 id="productTitle">Análise Comportamental</h1>
                            <div id="productIntro">
                                <!-- Data from infos.txt mapped here -->
                            </div>

                            <div id="seoBody" class="seo-body-section">
                                <!-- Data from seo.txt body mapped here -->
                            </div>
                        </div>
                    </div>

                    <div class="product-sidebar">
                        <div class="product-image-container mb-10">
                            <img id="productImage" src="../../assets/service/service1/img.png" alt="">
                        </div>

                        <div class="glass specs-card">
                            <span class="price-tag" id="productPrice">R$ ---</span>
                            <span class="pay-details" id="productPay">---</span>

                            <div class="mb-50">
                                <a id="buyBtn" href="#" class="btn btn-primary w-full btn-pulse btn-buy-trigger"
                                    target="_blank">Contratar agora</a>
                                <button id="doubtsBtn" class="btn btn-outline-glow w-full btn-doubts-trigger"
                                    style="margin-top: 10px;">Tirar dúvidas</button>
                            </div>

                            <div id="quickSpecs">
                                <!-- Additional info like delivery time etc -->
                            </div>
                        </div>
                    </div>

                </div>

                <div id="faqSection" class="glass faq-container mt-20">
                    <h2 class="section-title mb-50">Perguntas Frequentes</h2>
                    <div id="faqList">
                        <!-- FAQ from seo.txt here -->
                    </div>
                </div>

                <!-- Redundant Buttons at Bottom -->
                <div class="bottom-actions-wrap"
                    style="text-align: center; margin-top: 60px; display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px;">
                    <a id="buyBtnBottom" href="#" class="btn btn-primary btn-pulse btn-buy-trigger"
                        style="min-width: 280px;" target="_blank">Contratar agora</a>
                    <button id="doubtsBtnBottom" class="btn btn-outline-glow btn-doubts-trigger"
                        style="min-width: 280px;">Tirar dúvidas</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Doubts Selection Modal -->
    <div id="doubtsModal" class="modal-backdrop" aria-hidden="true">
        <div class="modal" style="width: 90%; max-width: 460px;">
            <button class="modal-close" id="closeDoubts">✕</button>
            <div class="modal-header-main"
                style="text-align: center; border-bottom: none; padding-bottom: 0; display: flex; flex-direction: column; align-items: center;">
                <h3 style="margin-bottom: 5px; white-space: nowrap; font-size: 1.2rem; width: 100%;">Como prefere falar
                    conosco?</h3>
                <p
                    style="color: rgba(255,255,255,0.5); white-space: nowrap; margin: 0; font-size: 0.9rem; width: 100%;">
                    Escolha o canal de sua preferência</p>
            </div>

            <div class="doubts-options">
                <div class="opt-card" id="optCalendly">
                    <div class="opt-icon">📅</div>
                    <h4>Reunião Online</h4>
                    <p>Agende um horário</p>
                </div>
                <div class="opt-card" id="optWhatsapp">
                    <div class="opt-icon">💬</div>
                    <h4>WhatsApp</h4>
                    <p>Resposta rápida</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Footer Placeholder -->
    <div id="global-footer"></div>

    <script src="../../site.js"></script>
    <script src="../product-page.js" data-service-id="service1"></script>
</body>

</html>
